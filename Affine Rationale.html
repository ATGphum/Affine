document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle-hover=\"background:#ffffff0f; color:#e5e5e5;\">Modes<\u002Fa>\n    <a href=\"#matrix\" style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#a1a1a1; text-decoration:none; padding:6px 9px; border-radius:6px;\" style-hover=\"background:#ffffff0f; color:#e5e5e5;\">Matrix<\u002Fa>\n    <a href=\"#test\" style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#a1a1a1; text-decoration:none; padding:6px 9px; border-radius:6px;\" style-hover=\"background:#ffffff0f; color:#e5e5e5;\">Test<\u002Fa>\n    <a href=\"#never\" style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#a1a1a1; text-decoration:none; padding:6px 9px; border-radius:6px;\" style-hover=\"background:#ffffff0f; color:#e5e5e5;\">Never become<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- ================= COVER ================= -->\n  <section class=\"ds-section\" style=\"position:relative; max-width:1120px; margin:0 auto; padding:84px 40px 60px; overflow:hidden;\">\n    <div style=\"position:absolute; inset:0; z-index:0; pointer-events:none; background:radial-gradient(circle at 80% 8%, rgba(118,102,245,.07), transparent 44%), radial-gradient(circle at 12% 92%, rgba(243,196,73,.06), transparent 46%);\"><\u002Fdiv>\n    <div style=\"position:relative; z-index:1;\">\n      <div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#f3c449; display:flex; align-items:center; gap:10px; margin-bottom:28px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#f3c449; box-shadow:0 0 14px rgba(243,196,73,.4);\"><\u002Fspan>Why the system is shaped this way<\u002Fdiv>\n      <h1 style=\"font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(48px,7.5vw,98px); line-height:.96; letter-spacing:-.01em; margin:0 0 24px;\">The rules have<br>reasons.<\u002Fh1>\n      <p style=\"font-size:clamp(16px,1.5vw,20px); line-height:1.58; color:#a1a1a1; max-width:38em; margin:0 0 22px;\">The token sheet tells you gold is <span style=\"font-family:'Geist Mono',monospace; color:#f3c449;\">#f3c449<\u002Fspan>. This tells you gold only appears after a path has been validated — so you don't spend it on a button that hasn't earned it. Every constraint in the design system traces back to one product truth.<\u002Fp>\n      <div style=\"font-family:'Instrument Serif',serif; font-style:italic; font-size:clamp(20px,2.2vw,28px); color:#e5e5e5;\">Affine makes intelligence compound.<\u002Fdiv>\n      <div style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#e5e5e540; margin-top:30px;\">Operational distillation · full doctrine lives in DESIGN_LANGUAGE.md<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= THESIS ================= -->\n  <section id=\"thesis\" class=\"ds-section\" style=\"max-width:1120px; margin:0 auto; padding:64px 40px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid #ffffff14; padding-bottom:18px; margin-bottom:34px;\">\n      <div style=\"display:flex; align-items:baseline; gap:18px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#f3c449; letter-spacing:.1em;\">01<\u002Fspan><h2 style=\"font-size:32px; font-weight:600; letter-spacing:-.02em; margin:0;\">The thesis<\u002Fh2><\u002Fdiv>\n      <span style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#e5e5e573;\">Alignment is the mechanism<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px;\">\n      <div style=\"border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:24px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#5ac8fa; margin-bottom:14px;\">Bittensor is the incentive layer<\u002Fdiv><p style=\"font-size:15px; line-height:1.6; color:#a1a1a1; margin:0;\">It produces an open economy of models, compute and capability. But producing intelligence is not the same as accumulating progress.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(243,196,73,.25); border-radius:10px; background:rgba(243,196,73,.04); padding:24px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#f3c449; margin-bottom:14px;\">Affine is the alignment layer<\u002Fdiv><p style=\"font-size:15px; line-height:1.6; color:#a1a1a1; margin:0;\">It creates the conditions under which independent, self-interested capability becomes cumulative progress. Alignment matters more than intention.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #ffffff14; border-radius:10px; background:#181818; padding:26px 28px; display:grid; gap:16px;\">\n      <div style=\"font-size:18px; line-height:1.5; color:#e5e5e5;\">Competition creates possibility. <span style=\"color:#f3c449;\">Alignment converts possibility into progress.<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:18px; line-height:1.5; color:#e5e5e5;\">Gold is the state that survived evaluation — <span style=\"color:#a1a1a1;\">evidence, not status.<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:18px; line-height:1.5; color:#e5e5e5;\">The best model is temporary. The mechanism persists. <span style=\"color:#a1a1a1;\">The frontier moves because the system remembers.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= OPERATING CYCLE ================= -->\n  <section id=\"cycle\" class=\"ds-section\" style=\"max-width:1120px; margin:0 auto; padding:64px 40px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid #ffffff14; padding-bottom:18px; margin-bottom:20px;\">\n      <div style=\"display:flex; align-items:baseline; gap:18px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#f3c449; letter-spacing:.1em;\">02<\u002Fspan><h2 style=\"font-size:32px; font-weight:600; letter-spacing:-.02em; margin:0;\">The operating cycle<\u002Fh2><\u002Fdiv>\n      <span style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#e5e5e573;\">Diverge → Align → Resolve → Inherit → Reopen<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:15px; line-height:1.6; color:#a1a1a1; max-width:48em; margin:0 0 16px;\">Every screen is a rendering of this sequence. When you build a view, you should be able to point at where each step lives in your data.<\u002Fp>\n    <p style=\"font-size:14px; line-height:1.6; color:#e5e5e573; max-width:48em; margin:0 0 28px;\">You can watch the whole loop in the landing field: spectral strands <span style=\"color:#7666f5;\">diverge<\u002Fspan>, bend under shared pressure, the useful ones reinforce a <span style=\"color:#f3c449;\">gold trace<\u002Fspan> that's inherited into the next era — then fresh strands enter and it reopens.<\u002Fp>\n    <div style=\"display:grid; gap:10px;\">\n      <div style=\"display:grid; grid-template-columns:130px 1fr 1fr; gap:18px; align-items:center; border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:18px 20px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#7666f5;\">Diverge<\u002Fdiv><div style=\"font-size:14px; color:#e5e5e5;\">Multiple actors, models and possibilities enter.<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#a1a1a1;\">miners · model revisions · submissions<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:130px 1fr 1fr; gap:18px; align-items:center; border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:18px 20px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#ff9b4e;\">Align<\u002Fdiv><div style=\"font-size:14px; color:#e5e5e5;\">Shared evaluation makes their work comparable.<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#a1a1a1;\">benchmark axes · rubrics · thresholds<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:130px 1fr 1fr; gap:18px; align-items:center; border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:18px 20px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#5ac8fa;\">Resolve<\u002Fdiv><div style=\"font-size:14px; color:#e5e5e5;\">Weak paths fail; strong paths reinforce.<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#a1a1a1;\">champion emerges · failed runs recede<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:130px 1fr 1fr; gap:18px; align-items:center; border:1px solid rgba(243,196,73,.3); border-radius:10px; background:rgba(243,196,73,.05); padding:18px 20px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#f3c449;\">Inherit<\u002Fdiv><div style=\"font-size:14px; color:#e5e5e5;\">Validated progress becomes the new baseline.<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#a1a1a1;\">gold frontier carried forward<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:130px 1fr 1fr; gap:18px; align-items:center; border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:18px 20px;\"><div style=\"font-family:'Geist Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#e85aa0;\">Reopen<\u002Fdiv><div style=\"font-size:14px; color:#e5e5e5;\">The advanced state spawns new divergence.<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#a1a1a1;\">next epoch · challenger queue · open slots<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:13px; line-height:1.6; color:#e5e5e573; font-style:italic; margin-top:16px;\">The system never fully resets. It remembers — that memory is why historical/receded states stay visible instead of disappearing.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= EXPRESSION MODES ================= -->\n  <section id=\"modes\" class=\"ds-section\" style=\"max-width:1120px; margin:0 auto; padding:64px 40px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid #ffffff14; padding-bottom:18px; margin-bottom:20px;\">\n      <div style=\"display:flex; align-items:baseline; gap:18px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#f3c449; letter-spacing:.1em;\">03<\u002Fspan><h2 style=\"font-size:32px; font-weight:600; letter-spacing:-.02em; margin:0;\">Expression modes<\u002Fh2><\u002Fdiv>\n      <span style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#e5e5e573;\">Pick from the user's need<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:15px; line-height:1.6; color:#a1a1a1; max-width:48em; margin:0 0 26px;\">One visual language, played at four volumes — loud on the landing, quiet in a data table, but always the same grammar. The most important call when you build a screen is which volume it's in: choose it from what the user needs to do, never from the mood you want.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px;\">\n      <div style=\"border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:20px; grid-column:1 / -1;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;\"><span style=\"font-size:16px; font-weight:600;\">Field<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:10px; color:#7666f5;\">highest intensity<\u002Fspan><\u002Fdiv><p style=\"font-size:13.5px; line-height:1.55; color:#a1a1a1; margin:0 0 12px;\">The visual language at full volume — the full-bleed animated frontier <em>is<\u002Fem> the content. Reserved for first-impression and brand moments.<\u002Fp><frontier-field style=\"position:relative; display:block; height:154px; border:1px solid #ffffff0f; border-radius:8px; overflow:hidden; margin:2px 0 8px;\"><\u002Ffrontier-field>\n<div style=\"font-family:'Geist Mono',monospace; font-size:9px; letter-spacing:.04em; color:#5ac8fa; margin-bottom:8px;\">↑ live · candidates diverge, the useful path inherits a gold frontier<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.04em; color:#ff4747;\">FAILS AS → wallpaper or spectacle<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:20px;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;\"><span style=\"font-size:16px; font-weight:600;\">Instrumented Field<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:10px; color:#5ac8fa;\">medium<\u002Fspan><\u002Fdiv><p style=\"font-size:13.5px; line-height:1.55; color:#a1a1a1; margin:0 0 12px;\">The field measured. Charts, thresholds, lineage and leaderboards — atmosphere is allowed, but evidence leads.<\u002Fp><div style=\"position:relative; height:74px; border:1px solid #ffffff0f; border-radius:7px; overflow:hidden; background:#141414; margin:2px 0 8px;\"><svg viewBox=\"0 0 240 74\" width=\"100%\" height=\"74\" preserveAspectRatio=\"none\" style=\"display:block;\"><line x1=\"8\" y1=\"62\" x2=\"232\" y2=\"62\" stroke=\"#ffffff14\" stroke-width=\"1\"><\u002Fline><line x1=\"8\" y1=\"26\" x2=\"232\" y2=\"26\" stroke=\"#f3c449\" stroke-width=\"1.4\" stroke-dasharray=\"3 3\" opacity=\"0.85\"><\u002Fline><polyline points=\"8,56 64,49 120,40 176,32 208,27\" stroke=\"#3d73e8\" stroke-width=\"1.7\" fill=\"none\"><\u002Fpolyline><polyline points=\"8,58 64,56 120,57 176,60 208,61\" stroke=\"#ff4747\" stroke-width=\"1.4\" fill=\"none\" opacity=\"0.5\"><\u002Fpolyline><circle cx=\"208\" cy=\"26\" r=\"3.2\" fill=\"#f3c449\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n<div style=\"font-family:'Geist Mono',monospace; font-size:9px; letter-spacing:.04em; color:#5ac8fa; margin-bottom:8px;\">↑ challenger traces meeting a gold frontier<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.04em; color:#ff4747;\">FAILS AS → unreadable data theatre<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:20px;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;\"><span style=\"font-size:16px; font-weight:600;\">Product Instrument<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:10px; color:#44ff9a;\">low<\u002Fspan><\u002Fdiv><p style=\"font-size:13.5px; line-height:1.55; color:#a1a1a1; margin:0 0 12px;\">The field at low volume — the grammar survives as row state, deltas, thresholds and selection. Built to be used repeatedly without fatigue.<\u002Fp><div style=\"border:1px solid #ffffff0f; border-radius:7px; overflow:hidden; font-family:'Geist Mono',monospace; font-size:9px; margin:2px 0 8px;\"><div style=\"display:grid; grid-template-columns:1fr 42px 38px; gap:8px; padding:5px 9px; background:#181818; color:#e5e5e540; letter-spacing:.08em;\"><span>MODEL<\u002Fspan><span style=\"text-align:right;\">SWE<\u002Fspan><span style=\"text-align:right;\">Δ<\u002Fspan><\u002Fdiv><div style=\"display:grid; grid-template-columns:1fr 42px 38px; gap:8px; padding:5px 9px; background:rgba(243,196,73,.07); color:#f3c449;\"><span>glaive-32b<\u002Fspan><span style=\"text-align:right;\">55.8<\u002Fspan><span style=\"text-align:right; color:#44ff9a;\">+2.1<\u002Fspan><\u002Fdiv><div style=\"display:grid; grid-template-columns:1fr 42px 38px; gap:8px; padding:5px 9px; color:#5ac8fa;\"><span>qwen-14b<\u002Fspan><span style=\"text-align:right; color:#a1a1a1;\">54.2<\u002Fspan><span style=\"text-align:right; color:#ff9b4e;\">eval<\u002Fspan><\u002Fdiv><div style=\"display:grid; grid-template-columns:1fr 42px 38px; gap:8px; padding:5px 9px; color:#e5e5e540;\"><span>mistral-7b<\u002Fspan><span style=\"text-align:right;\">41.0<\u002Fspan><span style=\"text-align:right; color:#ff4747;\">-1.4<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div style=\"font-family:'Geist Mono',monospace; font-size:9px; letter-spacing:.04em; color:#5ac8fa; margin-bottom:8px;\">↑ champion · challenger · receded rows<\u002Fdiv><div style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.04em; color:#ff4747;\">FAILS AS → generic admin dashboard<\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #ffffff14; border-radius:10px; background:#1f1f1f; padding:20px;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;\"><span style=\"font-size:16px; font-weight:600;\">Archive<\u002Fspan><span style=\"font-family:'Geist Mono',monospace; font-size:10px; color:#9bb2c8;\">low–medium<\u002Fspan><\u002Fdiv><p style=\"font-size:13.5px; line-height:1.55; color:#a1a1a1; margin:0 0 12px;\">The field as memory. Calm and text-forward, preserving causality and evidence over spectacle.<\u002Fp><div style=\"height:74px; border:1px solid #ffffff0f; border-radius:7px; background:#141414; padding:0 13px; display:flex; flex-direction:column; justify-content:center; gap:7px; margin:2px 0 8px;\"><div style=\"height:5px; width:60%; border-radius:3px; background:#e5e5e5; opacity:.55;\"><\u002Fdiv><div style=\"height:5px; width:80%; border-radius:3px; background:#e5e5e5; opacity:.3;\"><\u002Fdiv><div style=\"height:5px; width:46%; border-radius:3p \u002Fspan><span style=\"font-size:14px; line-height:1.5; color:#e5e5e5;\">Is the symbol useful identity, or competing with the field?<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; padding:14px 0; border-bottom:1px solid #ffffff0a;\"><span style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#f3c449; flex:0 0 auto;\">09<\u002Fspan><span style=\"font-size:14px; line-height:1.5; color:#e5e5e5;\">Which expression mode is this?<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; padding:14px 0; border-bottom:1px solid #ffffff0a;\"><span style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#f3c449; flex:0 0 auto;\">10<\u002Fspan><span style=\"font-size:14px; line-height:1.5; color:#e5e5e5;\">Has the grammar been translated at the right intensity?<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; padding:14px 0;\"><span style=\"font-family:'Geist Mono',monospace; font-size:12px; color:#f3c449; flex:0 0 auto;\">11<\u002Fspan><span style=\"font-size:14px; line-height:1.5; color:#e5e5e5;\">Does it make intelligence compounding visible?<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= NEVER BECOME ================= -->\n  <section id=\"never\" class=\"ds-section\" style=\"max-width:1120px; margin:0 auto; padding:64px 40px 84px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid #ffffff14; padding-bottom:18px; margin-bottom:26px;\">\n      <div style=\"display:flex; align-items:baseline; gap:18px;\"><span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#f3c449; letter-spacing:.1em;\">06<\u002Fspan><h2 style=\"font-size:32px; font-weight:600; letter-spacing:-.02em; margin:0;\">What it must never become<\u002Fh2><\u002Fdiv>\n      <span style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#e5e5e573;\">The fastest sanity check< ; color:#f3c449; margin-bottom:12px;\">The standard<\u002Fdiv>\n      <p style=\"font-size:16px; line-height:1.6; color:#e5e5e5; margin:0;\">Every visual choice should be defensible through product truth. If a screen can't show what is acting independently, what aligns it, what it's evaluated against, what survives and what is inherited — simplify it before adding more richness.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#e5e5e540; margin-top:26px; text-align:center;\">Source of truth: DESIGN_LANGUAGE.md · §17 non-negotiables · §19 the design test<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:880},&quot;embedded&quot;:{&quot;editor&quot;:null,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n  }\n  componentDidMount(){\n    if(this.props.embedded && this.rootRef.current){\n      const bar = this.rootRef.current.querySelector('.ds-topbar');\n      if(bar) bar.remove();\n      const ft = this.rootRef.current.querySelector('footer');\n      if(ft) ft.remove();\n    }\n    this._positionSubnav = () => {\n      const root = this.rootRef.current; if(!root) return;\n      const sub = root.querySelector('[data-ds-subnav]'); if(!sub) return;\n      let off = 0;\n      if(this.props.embedded){ const h = document.querySelector('.af-site-header'); off = h ? h.getBoundingClientRect().height : 0; }\n      else { const tb = root.querySelector('.ds-topbar'); off = tb ? tb.getBoundingClientRect().height : 0; }\n      sub.style.top = Math.round(off) + 'px';\n    };\n    this._positionSubnav();\n    setTimeout(this._positionSubnav, 80);\n    window.addEventListener('resize', this._positionSubnav);\n  }\n  componentWillUnmount(){\n    if(this._positionSubnav) window.removeEventListener('resize', this._positionSubnav);\n  }\n  renderVals(){\n    return { rootRef: this.rootRef, doPrint: () => window.print() };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
